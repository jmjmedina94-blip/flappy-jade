<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#241b3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flappy Jade 👑</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E👑%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<noscript><p style="color:#fff;text-align:center;padding:40px;">Flappy Jade needs JavaScript to play 💖</p></noscript>

<div id="stage">
  <div id="frame">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="ui">
      <button id="muteBtn" class="chip" type="button" aria-label="Toggle sound">🔊</button>

      <section id="menuScreen" class="screen">
        <h1 class="title"><span class="tw">✦</span> Flappy Jade <span class="tw t2">✦</span></h1>
        <p class="subtitle">a sparkly sky adventure</p>
        <div class="spacer"></div>
        <div id="menuBest" class="bestline">👑 Best: 0 · Level 1</div>
        <button id="startBtn" class="btn big" type="button">▶ START</button>
        <button id="resetBtn" class="btn tiny" type="button">reset high score</button>
      </section>

      <section id="overScreen" class="screen veil hidden">
        <div class="panel">
          <h2 class="over-title">Game Over</h2>
          <div id="newBestBanner" class="banner hidden">✨ New Best! ✨</div>
          <div class="stats">
            <div class="stat"><span>Score</span><b id="finalScore">0</b></div>
            <div class="stat"><span>Best</span><b id="finalBest">0</b></div>
            <div class="stat"><span>Level</span><b id="finalLevel">1</b></div>
          </div>
          <div class="row">
            <button id="retryBtn" class="btn big" type="button">RETRY</button>
            <button id="menuBtn" class="btn purple" type="button">MENU</button>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>

<div id="rotateOverlay" aria-hidden="true">
  <div class="phone">📱</div>
  <p>Rotate your phone to play!</p>
  <p class="small">Flappy Jade is a landscape game 💖</p>
</div>

<script src="game.js" defer></script>
</body>
</html>
